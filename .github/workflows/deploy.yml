name: Build and Deploy to Cloud Run

# Deploy automatically whenever code is pushed to the main branch.
on:
  push:
    branches: ["main"]

permissions:
  contents: read

env:
  # These come from GitHub repository secrets (Settings > Secrets > Actions).
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}
  ARTIFACT_REGISTRY: ${{ secrets.ARTIFACT_REGISTRY }}   # e.g. "linkedin-builder"
  SERVICE: ${{ secrets.CLOUD_RUN_SERVICE }}             # e.g. "linkedin-profile-builder"
  # Vertex AI region for Gemini. Independent of the Cloud Run region above:
  # the model must be served here. Optional secret; defaults to us-central1.
  VERTEX_LOCATION: ${{ secrets.VERTEX_LOCATION }}

jobs:
  deploy:
    name: Build image and deploy
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository.
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python (used for optional lint / sanity checks).
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sanity check (compile sources)
        run: python -m compileall app.py utils.py prompts.py

      # Fail fast with a clear message if any required secret is missing/empty.
      - name: Verify required secrets
        run: |
          missing=""
          [ -z "${PROJECT_ID}" ] && missing="${missing} GCP_PROJECT_ID"
          [ -z "${REGION}" ] && missing="${missing} GCP_REGION"
          [ -z "${ARTIFACT_REGISTRY}" ] && missing="${missing} ARTIFACT_REGISTRY"
          [ -z "${SERVICE}" ] && missing="${missing} CLOUD_RUN_SERVICE"
          if [ -n "${missing}" ]; then
            echo "::error::Missing/empty repository secrets:${missing}"
            echo "Add them under Settings > Secrets and variables > Actions"
            echo "on the SECRETS tab (not Variables)."
            exit 1
          fi
          echo "All required deploy secrets are present."

      # 3. Compute a unique image tag from the commit SHA.
      - name: Set image tag
        id: vars
        run: echo "IMAGE=${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REGISTRY}/${SERVICE}:${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      # 4. Authenticate to Google Cloud using a Service Account Key JSON.
      #    Store the ENTIRE key file contents in the GCP_SA_KEY secret.
      #    (For keyless auth, see the Workload Identity Federation notes in
      #    the README.)
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # 5. Install and configure the gcloud CLI.
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # 6. Configure Docker to push to Artifact Registry.
      - name: Configure Docker authentication
        run: gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet

      # 7. Build the Docker image.
      - name: Build Docker image
        run: docker build -t "${{ steps.vars.outputs.IMAGE }}" .

      # 8. Push the image to Artifact Registry.
      - name: Push image to Artifact Registry
        run: docker push "${{ steps.vars.outputs.IMAGE }}"

      # 9. Deploy to Cloud Run. No API key - the runtime service account
      #    authenticates to Vertex AI via Application Default Credentials.
      #    We pass the project/location so the app can build the Vertex client.
      - name: Deploy to Cloud Run
        id: deploy
        run: |
          # Vertex AI location must serve the Gemini model; it is NOT tied to
          # the Cloud Run region. Default to us-central1 if the secret is unset.
          VERTEX_LOCATION="${VERTEX_LOCATION:-us-central1}"
          gcloud run deploy "${SERVICE}" \
            --image "${{ steps.vars.outputs.IMAGE }}" \
            --region "${REGION}" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --set-env-vars "GOOGLE_CLOUD_PROJECT=${PROJECT_ID},GOOGLE_CLOUD_LOCATION=${VERTEX_LOCATION}"

      # 10. Print the public service URL.
      - name: Show deployment URL
        run: |
          URL=$(gcloud run services describe "${SERVICE}" \
            --region "${REGION}" --format 'value(status.url)')
          echo "Deployed to: ${URL}"
          echo "### 🚀 Deployed to Cloud Run" >> "$GITHUB_STEP_SUMMARY"
          echo "[$URL]($URL)" >> "$GITHUB_STEP_SUMMARY"
